openapi: 3.0.3
info:
  title: Open Movie Planer API
  version: 0.2.0
  description: Aktueller API-Stand mit Projekt-, Budget-, Dispo-, Kontakt-, Vertrags- und Zeiterfassungsmodulen.

servers:
  - url: http://localhost:3000

tags:
  - name: Projects
  - name: CostCenters
  - name: CostPositions
  - name: BudgetScenarios
  - name: Expenses
  - name: ShootDays
  - name: ShootDayActivities
  - name: ShootDispositions
  - name: Scenes
  - name: CrewAssignments
  - name: CastAssignments
  - name: ExternalCostAccounting
  - name: Dashboard
  - name: Contacts
  - name: Appointments
  - name: Contracts
  - name: TimeEntries
  - name: Health

paths:
  /projects:
    get:
      tags: [Projects]
      summary: List projects
      responses:
        '200': { description: OK }
    post:
      tags: [Projects]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Created }

  /projects/{projectId}:
    get:
      tags: [Projects]
      summary: Get project
      parameters: [{ $ref: '#/components/parameters/ProjectId' }]
      responses:
        '200': { description: OK }
        '404': { description: Not Found }
    put:
      tags: [Projects]
      summary: Update project
      parameters: [{ $ref: '#/components/parameters/ProjectId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }
    delete:
      tags: [Projects]
      summary: Delete project
      parameters: [{ $ref: '#/components/parameters/ProjectId' }]
      responses:
        '204': { description: No Content }

